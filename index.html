<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Início | Roxinho Shop</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="src/recursos/imagens/favicon-roxinhoshop.png">

  <!-- CSS -->
  <link rel="stylesheet" href="src/estilos/componentes/inicio.css">
  <link rel="stylesheet" href="src/estilos/layouts/cabecalho-rodape.css">
  <link rel="stylesheet" href="src/estilos/layouts/responsivo.css">
  <link rel="stylesheet" href="src/estilos/componentes/cabecalho-autenticacao.css">
  <link rel="stylesheet" href="src/estilos/componentes/historico-inicio.css">
  <link rel="stylesheet" href="src/estilos/componentes/notificacoes-fluent.css">
  <link rel="stylesheet" href="src/estilos/temas/modo-escuro.css">
  <link rel="stylesheet" href="src/estilos/temas/fluent-dark.css">
  <link rel="stylesheet" href="src/estilos/temas/correcao-espacos-brancos.css">
  <link rel="stylesheet" href="src/estilos/componentes/inicio-modo-escuro.css">
  <link rel="stylesheet" href="src/estilos/temas/botao-tema.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200..1000&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../estilos/temas/gradiente-hover-global.css">
</head>
<body>

  <div id="header-placeholder"></div>









  <div id="footer-placeholder"></div>

  <!-- JS - ORDEM IMPORTANTE! -->
  <script src="src/scripts/componentes/modal-fluent.js"></script>
  <script src="src/scripts/componentes/api-produtos.js"></script>
  <script src="src/scripts/componentes/produtos-vistos.js"></script>
  <script src="src/scripts/componentes/inicio.js"></script>
  <script src="src/scripts/utilitarios/cabecalho-rodape.js"></script>
  <script src="src/scripts/componentes/cabecalho-autenticacao.js"></script>
  <script src="src/scripts/componentes/notificacoes-fluent.js"></script>
  <script src="src/scripts/componentes/historico-inicio.js"></script>
  <script src="src/scripts/componentes/alternador-tema.js"></script>
  <script>
    window.API_BASE_URL = "https://roxinho-shop-backend.vercel.app/api";
  </script>
  
  <script>
  fetch('src/paginas/cabecalho-rodape.html')
    .then(response => response.text())
    .then(data => {
      // Corrigir caminhos relativos para funcionar na raiz
      data = data.replace(/href="\.\.\/recursos/g, 'href="src/recursos');
      data = data.replace(/src="\.\.\/recursos/g, 'src="src/recursos');
      data = data.replace(/href="\.\.\/estilos/g, 'href="src/estilos');
      data = data.replace(/src="\.\.\/scripts/g, 'src="src/scripts');
      
      // Corrigir link do logo para voltar à página inicial
      data = data.replace(/href="\.\.\/\.\.\/index\.html"/g, 'href="/');
      
      // Corrigir links para páginas HTML (com ou sem parâmetros)
      // Exceto quando já tem src/paginas/ ou começa com ../..
      data = data.replace(/href="(?!src\/paginas\/)(?!\.\.\/\.\.\/)([a-z\-]+)\.html/g, 'href="src/paginas/$1.html');
      
      const parser = new DOMParser();
      const doc = parser.parseFromString(data, 'text/html');

      const header = doc.querySelector('nav.cabecalho');
      const categorias = doc.querySelector('.barra-categorias');
      const footer = doc.querySelector('footer.rodape');

      if (header) {
        // Adicionar contador do carrinho ao cabeçalho
        const carrinhoLink = header.querySelector('.caixa-carrinho');
        if (carrinhoLink && !carrinhoLink.querySelector('.contador-carrinho')) {
          const contador = document.createElement('span');
          contador.id = 'contador-carrinho-cabecalho';
          contador.className = 'contador-carrinho';
          contador.textContent = '0';
          contador.style.display = 'none';
          carrinhoLink.appendChild(contador);
        }
        
        document.getElementById('header-placeholder').appendChild(header);
      }
      if (categorias) document.getElementById('header-placeholder').appendChild(categorias);
      if (footer) document.getElementById('footer-placeholder').appendChild(footer);

      // Executar scripts do cabecalho/rodape
      doc.querySelectorAll("script").forEach(oldScript => {
        const newScript = document.createElement("script");
        if (oldScript.src) {
          // Corrigir caminho do script
          let srcCorrigido = oldScript.src.replace('../scripts', 'src/scripts');
          newScript.src = srcCorrigido;
        } else {
          newScript.textContent = oldScript.textContent;
        }
        document.body.appendChild(newScript);
      });

      // Atualizar contador do carrinho após carregar o cabeçalho
      if (typeof atualizarContadorCarrinho === 'function') {
        atualizarContadorCarrinho();
      }
    })
    .catch(error => {
      console.error('Erro ao carregar cabeçalho/rodapé:', error);
    });
  </script>
</body>
</html>
