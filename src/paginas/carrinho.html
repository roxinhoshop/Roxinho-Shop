<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Carrinho | Roxinho Shop</title>
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../recursos/imagens/favicon-roxinhoshop.png">
    <!-- CSS -->
    <link rel="stylesheet" href="../estilos/layouts/cabecalho-rodape.css">
    <link rel="stylesheet" href="../estilos/componentes/carrinho.css">
    <link rel="stylesheet" href="../estilos/componentes/notificacoes-fluent.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200..1000&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div id="header-placeholder"></div>

    <main class="container">
        <h1>Meu Carrinho</h1>
        <div id="carrinho-vazio" class="carrinho-vazio" style="display: none;">
            <i class="fas fa-shopping-cart"></i>
            <p>Seu carrinho está vazio.</p>
            <a href="../../index.html" class="btn-continuar-comprando">Continuar Comprando</a>
        </div>
        <div id="itens-carrinho" class="itens-carrinho">
            <!-- Itens do carrinho serão carregados aqui -->
        </div>
        <div id="resumo-carrinho" class="resumo-carrinho" style="display: none;">
            <h2>Resumo do Pedido</h2>
            <div class="resumo-linha">
                <span>Subtotal:</span>
                <span id="subtotal-carrinho">R$ 0,00</span>
            </div>
            <div class="resumo-linha">
                <span>Frete:</span>
                <span id="frete-carrinho">R$ 0,00</span>
            </div>
            <div class="resumo-linha total">
                <span>Total:</span>
                <span id="total-carrinho">R$ 0,00</span>
            </div>
            <button id="btn-finalizar-compra" class="btn-finalizar-compra">Finalizar Compra</button>
            <a href="../../index.html" class="btn-continuar-comprando">Continuar Comprando</a>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <script src="../../load-header-footer.js"></script>
    <script src="../scripts/componentes/notificacoes.js"></script>
    <script src="../scripts/componentes/carrinho.js"></script>
</body>
</html>
