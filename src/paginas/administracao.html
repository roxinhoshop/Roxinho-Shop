<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Roxinho Shop - Painel de Administração</title>
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../recursos/imagens/favicon-roxinhoshop.png">
    
    <link rel="stylesheet" href="../estilos/administracao.css">
    <link rel="stylesheet" href="../estilos/notificacoes.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
  <link rel="stylesheet" href="../estilos/design-fluent.css">
  <link rel="stylesheet" href="../estilos/modo-escuro.css">
  <link rel="stylesheet" href="../estilos/botao-tema.css">
</head>
<body>
    <header>
        <div class="container">
            <div class="logo">
                <a href="../../index.html">Roxinho Shop</a>
            </div>
            <nav>
                <ul>
                    <li><a href="../../index.html">Home</a></li>
                    <li><a href="administracao.html" class="active">Admin</a></li>
                    <li><a href="#">Sair</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <main class="container">
        <h1>Painel de Administração de Produtos</h1>

        <div class="admin-actions">
            <button id="btnAdicionarProduto" class="btn btn-primary"><i class="fas fa-plus"></i> Adicionar Novo Produto</button>
        </div>

        <div class="form-container">
            <h2 id="form-title">Adicionar Novo Produto</h2>
            <form id="product-form">
                <input type="hidden" id="product-id">
                <label for="product-name">Nome do Produto:</label>
                <input type="text" id="product-name" required>

                <label for="product-description">Descrição:</label>
                <textarea id="product-description" required></textarea>

                <label for="product-price">Preço:</label>
                <input type="number" id="product-price" step="0.01" required>

                <label for="product-stock">Estoque:</label>
                <input type="number" id="product-stock" required>

                <label for="product-category">Categoria:</label>
                <input type="text" id="product-category" required>

                <label for="product-subcategory">Subcategoria:</label>
                <input type="text" id="product-subcategory">

                <label for="product-image-url">URL da Imagem:</label>
                <input type="url" id="product-image-url" required>

                <div class="checkbox-group">
                    <input type="checkbox" id="product-featured">
                    <label for="product-featured">Destaque</label>
                </div>

                <div class="checkbox-group">
                    <input type="checkbox" id="product-active" checked>
                    <label for="product-active">Ativo</label>
                </div>

                <button type="button" id="save-product-btn">Adicionar Produto</button>
                <button type="button" id="cancel-edit-btn" style="display: none;">Cancelar Edição</button>
            </form>
        </div>

        <div class="tabela-produtos">
            <h2>Lista de Produtos</h2>
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nome</th>
                        <th>Preço</th>
                        <th>Estoque</th>
                        <th>Categoria</th>
                        <th>Subcategoria</th>
                        <th>Imagem</th>
                        <th>Destaque</th>
                        <th>Ativo</th>
                        <th>Ações</th>
                    </tr>
                </thead>
                <tbody id="product-list">
                    <!-- Produtos serão carregados aqui via JavaScript -->
                </tbody>
            </table>
        </div>
    </main>

    <footer>
        <div class="container">
            <p>&copy; 2023 Roxinho Shop. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script src="../scripts/notificacoes.js"></script>
    <script src="../scripts/autenticacao.js"></script>
    <script src="../scripts/administracao.js"></script>
  <script src="../scripts/alternador-tema.js"></script>
</body>
</html>
