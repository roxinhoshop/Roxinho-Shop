<!DOCTYPE html>

<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sessão | Roxinho Shop</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="../recursos/imagens/favicon-roxinhoshop.png">
  
  <!-- CSS -->
  <link rel="stylesheet" href="../estilos/entrar.css">
  <link rel="stylesheet" href="../estilos/cabecalho-rodape.css">
  <link rel="stylesheet" href="../estilos/cabecalho-autenticacao.css">
  <link rel="stylesheet" href="../estilos/animacao-sucesso.css">
  <link rel="stylesheet" href="../estilos/botao-carregamento.css">
  <link rel="stylesheet" href="../estilos/notificacoes.css">
  <link rel="stylesheet" href="../estilos/design-fluent.css">
  <link rel="stylesheet" href="../estilos/modo-escuro.css">
  <link rel="stylesheet" href="../estilos/botao-tema.css">
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200..1000&display=swap" rel="stylesheet">
</head>
<body>
  <div id="header-placeholder"></div>

  <!-- Conteúdo Login -->
  <main class="container">
    <div class="login-section">
      <!-- Banner Lateral -->
      <div class="login-banner">
        <div class="banner-content">
          <h2>Bem-vindo de volta!</h2>
          <p>Acesse sua conta e aproveite as melhores ofertas</p>
          <div class="banner-image-placeholder">
            <!-- Aqui você pode adicionar uma imagem ou ilustração -->
            <i class="fas fa-shopping-bag"></i>
          </div>
        </div>
      </div>
      
      <!-- Formulário de Login -->
      <form class="login-card" id="loginForm" novalidate>

        <div id="two-factor-auth-section" style="display: none;">
          <p>Insira o código 2FA enviado para seu e-mail.</p>
          <div class="form-group">
            <input type="text" id="twoFactorCode" class="form-input" placeholder="Código 2FA" required>
            <label class="floating-label">Código 2FA <span class="required">*</span></label>
          </div>
          <button type="button" id="resendTwoFactorCode" class="link-button">Reenviar Código</button>
        </div>
        <h2 class="welcome-text">Iniciar sessão</h2>
        <p class="welcome-subtitle">Bem-vindo à Roxinho Shop! Por favor, insira seus dados</p>

        <!-- E-mail -->
        <div class="form-group">
          <input type="email" id="email" class="form-input" required>
          <label class="floating-label">E-mail <span class="required">*</span></label>
        </div>

        <!-- Senha -->
        <div class="form-group">
          <input type="password" id="senha" class="form-input" required>
          <label class="floating-label">Senha <span class="required">*</span></label>
          <span class="toggle-password" onclick="togglePasswordVisibility('senha')"><i class="fa fa-eye" aria-hidden="true"></i></span>
        </div>

        <div class="forgot-password">
          <a href="redefinir-senha.html">Esqueceu sua senha?</a>
        </div>

        <div class="beta-notice">
          <span>Você está acessando uma versão beta.</span>
        </div>

        <button type="submit" class="login-button" id="botaoLogin">
          <span>Entrar</span>
        </button>

        <!-- Login com Google -->
        <div id="googleBtn" class="google-btn"></div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="outline"
             data-text="sign_in_with"
             data-size="large">
        </div>

        <!-- Link para cadastro -->
        <p class="register-link">
          Não tem uma conta ainda? 
          <a href="./cadastro.html">Cadastre-se</a>
        </p>
      </form>
    </div>
  </main>

    <!-- Placeholder para Footer -->
  <div id="footer-placeholder"></div>


  <!-- Scripts -->
  <script src="../scripts/botao-carregamento.js"></script>
  <!-- JS - ORDEM IMPORTANTE! -->
  <script src="../scripts/banco-dados.js"></script>
  <script src="../scripts/animacao-sucesso.js"></script>
  <script src="../scripts/cabecalho-autenticacao.js"></script>
  <script src="../scripts/notificacoes.js"></script>
  <script src="../scripts/entrar.js"></script>
  <script src="../scripts/alternador-tema.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>

  <script>
  fetch('cabecalho-rodape.html')
    .then(response => response.text())
    .then(data => {
      const parser = new DOMParser();
      const doc = parser.parseFromString(data, 'text/html');

      const header = doc.querySelector('nav.cabecalho');
      const categorias = doc.querySelector('.barra-categorias');
      const footer = doc.querySelector('footer.rodape');

      if (header) {
        // Adicionar contador do carrinho ao cabeçalho
        const carrinhoLink = header.querySelector('.caixa-carrinho');
        if (carrinhoLink && !carrinhoLink.querySelector('.contador-carrinho')) {
          const contador = document.createElement('span');
          contador.id = 'contador-carrinho-cabecalho';
          contador.className = 'contador-carrinho';
          contador.textContent = '0';
          contador.style.display = 'none';
          carrinhoLink.appendChild(contador);
        }
        
        document.getElementById('header-placeholder').appendChild(header);
      }
      if (categorias) document.getElementById('header-placeholder').appendChild(categorias);
      if (footer) document.getElementById('footer-placeholder').appendChild(footer);

      // Executar scripts do cabecalho/rodape
      doc.querySelectorAll("script").forEach(oldScript => {
        const newScript = document.createElement("script");
        if (oldScript.src) newScript.src = oldScript.src;
        else newScript.textContent = oldScript.textContent;
        document.body.appendChild(newScript);
      });

      // Atualizar contador do carrinho após carregar o cabeçalho
      if (typeof atualizarContadorCarrinho === 'function') {
        atualizarContadorCarrinho();
      }
    })
    .catch(error => {
      console.error('Erro ao carregar cabeçalho/rodapé:', error);
    });
  </script>
</body>
</html>
