<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações | Roxinho Shop</title>

    <!-- CSS -->
    <link rel="stylesheet" href="../estilos/layouts/cabecalho-rodape.css">
    <link rel="stylesheet" href="../estilos/componentes/painel-usuario.css">
    <link rel="stylesheet" href="../estilos/componentes/tema-escuro-2025.css">
    <link rel="stylesheet" href="../estilos/componentes/sistema-xp.css">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200..1000&display=swap" rel="stylesheet">

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="../recursos/imagens/favicon-roxinhoshop.png">
    <link rel="stylesheet" href="../estilos/componentes/cabecalho-autenticacao.css">
    <link rel="stylesheet" href="../estilos/componentes/notificacoes-fluent.css">
    <link rel="stylesheet" href="../estilos/temas/design-fluent.css">
    <link rel="stylesheet" href="../estilos/temas/modo-escuro.css">
    <link rel="stylesheet" href="../estilos/temas/fluent-dark.css">
    <link rel="stylesheet" href="../estilos/temas/correcao-espacos-brancos.css">
    <link rel="stylesheet" href="../estilos/temas/botao-tema.css">
    <link rel="stylesheet" href="../estilos/temas/gradiente-hover-global.css">
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="container-painel">
        <div class="container">
            <div class="wrapper-conteudo">
                <!-- Sidebar -->
                <nav class="coluna-esquerda">
                    <div class="barra-filtros">
                        <div class="cabecalho-filtros">
                            <h3>Menu Principal</h3>
                        </div>
                        
                        <ul class="menu-navegacao">
                            <li class="item-navegacao">
                                <a href="#" class="link-navegacao active" data-section="profile">
                                    <i class="fas fa-user"></i>
                                    <span>Perfil</span>
                                </a>
                            </li>
                            <li class="item-navegacao">
                                <a href="#" class="link-navegacao" data-section="historico">
                                    <i class="fas fa-history"></i>
                                    <span>Histórico</span>
                                </a>
                            </li>
                        </ul>
                    </div>
                </nav>

                <!-- Área Principal -->
                <main class="area-produtos">
                    <!-- Banner de Categoria -->
                    <div class="breadcrumb-dinamico">
                        <span class="texto-voce-esta-em">Você está em:</span>
                        <div class="caminho">
                            <span class="item-caminho">Configurações</span>
                            <span class="separador">></span>
                            <span class="item-caminho ativo" id="breadcrumb-atual">Perfil</span>
                        </div>
                    </div> 
                    
                    <div class="banner-categoria">
                        <div class="conteudo-banner">
                            <h2 class="titulo-categoria" id="titulo-secao">Configurações</h2>
                        </div>
                    </div>

                    <!-- Profile Section -->
                    <section id="profile" class="secao-conteudo active">
                        <div class="formulario-perfil">
                            <h3>Informações Pessoais</h3>
                            <form id="form-perfil">
                                <div class="grupo-formulario linha-dupla">
                                    <div class="campo-formulario">
                                        <label for="nome">Nome</label>
                                        <input type="text" id="nome" name="nome" value="" class="input-preco">
                                    </div>
                                    <div class="campo-formulario">
                                        <label for="sobrenome">Sobrenome</label>
                                        <input type="text" id="sobrenome" name="sobrenome" value="" class="input-preco">
                                    </div>
                                </div>
                                
                                <div class="campo-formulario">
                                    <label for="email">Email</label>
                                    <input type="email" id="email" name="email" value="" class="input-preco">
                                </div>
                                
                                <div class="campo-formulario">
                                    <label>Foto de Perfil</label>
                                    <div class="upload-avatar-container">
                                        <div class="avatar-preview">
                                            <img id="preview-foto-perfil" src="../recursos/imagens/default.png" alt="Avatar">
                                            <div class="avatar-overlay">
                                                <i class="fas fa-camera"></i>
                                                <span>Alterar Avatar</span>
                                            </div>
                                        </div>
                                        <div class="avatar-info">
                                            <p class="avatar-title">Escolha uma imagem</p>
                                            <p class="avatar-subtitle">Recomendamos uma imagem de pelo menos 128x128px</p>
                                            <div class="avatar-buttons">
                                                <label for="foto-perfil" class="btn-upload">
                                                    <i class="fas fa-upload"></i> Enviar Imagem
                                                </label>
                                                <button type="button" class="btn-remove" id="btn-remover-avatar">
                                                    <i class="fas fa-trash"></i> Remover
                                                </button>
                                            </div>
                                            <input type="file" id="foto-perfil" name="foto-perfil" accept="image/*" style="display: none;">
                                        </div>
                                    </div>
                                </div>

                                <div class="campo-formulario">
                                    <label for="senha-atual">Senha Atual</label>
                                    <input type="password" id="senha-atual" name="senha-atual" class="input-preco">
                                </div>
                                <div class="campo-formulario">
                                    <label for="nova-senha">Nova Senha</label>
                                    <input type="password" id="nova-senha" name="nova-senha" class="input-preco">
                                </div>
                                <div class="campo-formulario">
                                    <label for="confirmar-nova-senha">Confirmar Nova Senha</label>
                                    <input type="password" id="confirmar-nova-senha" name="confirmar-nova-senha" class="input-preco">
                                </div>

                                
                                <div class="acoes-formulario">
                                    <button type="submit" class="botao-primario">Salvar Alterações</button>
                                    <button type="button" class="botao-secundario">Cancelar</button>
                                </div>
                            </form>
                        </div>
                    </section>

                    <!-- Histórico de Produtos Vistos Section -->
                    <section id="historico" class="secao-conteudo">
                        <div class="barra-ordenacao-simples">
                            <h3>Produtos Vistos Recentemente</h3>
                            <button class="botao-secundario" id="limpar-historico-btn">
                                <i class="fas fa-trash"></i> Limpar Histórico
                            </button>
                        </div>
                        <div id="historico-lista" class="grade-produtos">
                            <!-- Produtos vistos serão carregados aqui via JavaScript -->
                        </div>
                    </section>
                </main>
            </div>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <!-- JavaScript -->
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="../scripts/componentes/api-system.js"></script>
    <script src="../scripts/componentes/painel-usuario.js"></script>
    <script src="../scripts/componentes/historico.js"></script>
    <script src="https://cdn.rawgit.com/davidshimjs/qrcodejs/gh-pages/qrcode.min.js"></script>
    <script src="../scripts/componentes/cabecalho-autenticacao.js"></script>
    <script src="../scripts/componentes/notificacoes-fluent.js"></script>
    <script src="../scripts/componentes/alternador-tema.js"></script>
    <script src="../scripts/utilitarios/cabecalho-rodape.js"></script>
    
    <!-- Script de Preview de Avatar -->
    <script>
        // Preview de Avatar estilo Discord
        document.getElementById(\'foto-perfil\').addEventListener(\'change\', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById(\'preview-foto-perfil\').src = event.target.result;
                };
                reader.readAsDataURL(file);
            }
        });

        // Remover Avatar
        document.getElementById(\'btn-remover-avatar\').addEventListener(\'click\', function() {
            document.getElementById(\'preview-foto-perfil\').src = \'../recursos/imagens/default.png\';
            document.getElementById(\'foto-perfil\').value = \'\';
        });

        // Clicar no avatar para abrir seletor de arquivo
        document.querySelector(\'\.avatar-preview\').addEventListener(\'click\', function() {
            document.getElementById(\'foto-perfil\').click();
        });

        // Logout
        document.getElementById(\'btn-logout-usuario\')?.addEventListener(\'click\', function(e) {
            e.preventDefault();
            // O modal de logout já está sendo tratado globalmente pelo cabecalho-autenticacao.js
            // Este trecho pode ser removido ou adaptado se houver uma necessidade específica de logout aqui.
            // Por enquanto, vamos manter apenas a lógica de logout global.
        });
    </script>
    
    <!-- Produtos Vistos -->
    <script src="../scripts/componentes/produtos-vistos.js"></script>


</body>
</html>
