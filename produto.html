<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Produto | Roxinho Shop</title>
    <link rel="stylesheet" href="src/estilos/componentes/produto.css">
    
    <!-- Favicon -->
    <link rel="icon" type="image/png" href="src/recursos/imagens/favicon-roxinhoshop.png">
    
    <!-- CSS -->
  <link rel="stylesheet" href="src/estilos/layouts/cabecalho-rodape.css">

    
    <link rel="stylesheet" href="src/estilos/layouts/responsivo.css">
    <link rel="stylesheet" href="src/estilos/temas/design-fluent.css">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    
    <!-- Google Fonts -->
    
</head>
<body>
<div id="header-placeholder"></div>



    

    <div class="container-produto">
            <div class="produto-detalhes">
                <div class="produto-imagem-galeria">
                    <img id="imagem-principal" src="" alt="Imagem Principal do Produto">
                    <div class="galeria-miniaturas" id="galeria-miniaturas">
                        <!-- Miniaturas serão carregadas aqui pelo JS -->
                    </div>
                </div>
                <div class="produto-info">
                    <h1 id="titulo-produto"></h1>
                    <p class="produto-preco"><span id="preco-atual"></span></p>
                    <div class="produto-descricao-longa">
                        <h2>Detalhes do Produto</h2>
                        <p id="descricao-longa-conteudo"></p>
                    </div>

                    <div class="botoes-compra">
                        <a id="btn-mercado-livre" href="#" target="_blank" class="botao-mercado-livre">Comprar no Mercado Livre (<span id="preco-ml"></span>)</a>
                        <a id="btn-amazon" href="#" target="_blank" class="botao-amazon">Comprar na Amazon (<span id="preco-amazon"></span>)</a>
                    </div>
                </div>
            </div>
        </div>

    

    <script src="src/scripts/componentes/api-produtos.js"></script>
    <script src="src/scripts/componentes/produto.js"></script>
    
    
    
    






<div id="footer-placeholder"></div>
<script src="load-header-footer.js"></script>
</body>
</html>
