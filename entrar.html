<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Iniciar sessão | Roxinho Shop</title>
  
  <!-- Favicon -->
  <link rel="icon" type="image/png" href="src/recursos/imagens/favicon-roxinhoshop.png">
  
  <!-- CSS -->
  <link rel="stylesheet" href="src/estilos/layouts/cabecalho-rodape.css">

  <link rel="stylesheet" href="src/estilos/componentes/entrar.css">
  
  <link rel="stylesheet" href="src/estilos/componentes/cabecalho-autenticacao.css">
  <link rel="stylesheet" href="src/estilos/componentes/animacao-sucesso.css">
  <link rel="stylesheet" href="src/estilos/componentes/botao-carregamento.css">
  
  <link rel="stylesheet" href="src/estilos/temas/design-fluent.css">
  <link rel="stylesheet" href="src/estilos/temas/modo-escuro.css">
  <link rel="stylesheet" href="src/estilos/temas/fluent-dark.css">
  <link rel="stylesheet" href="src/estilos/temas/correcao-espacos-brancos.css">
  <link rel="stylesheet" href="src/estilos/temas/botao-tema.css">
  
  <!-- Font Awesome -->
  
  
  <!-- Google Fonts -->
  
  
  

  <!-- CSS Padrão do Site -->
  <link rel="stylesheet" href="src/estilos/componentes/notificacoes-fluent.css">
  <link rel="stylesheet" href="src/estilos/componentes/busca-global.css">
  <link rel="stylesheet" href="src/estilos/temas/gradiente-hover-global.css">


  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200..1000&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>
<body>
<div id="header-placeholder"></div>



  

  <!-- Conteúdo Login -->
  <main class="container">
    <div class="login-section">
      <!-- Banner Lateral -->
      <div class="login-banner">
        <div class="banner-image-placeholder">
          <img src="src/recursos/imagens/banner-login.jpg" alt="Bem-vindo">
        </div>
      </div>
      
      <!-- Formulário de Login -->
      <form class="login-card" id="loginForm" novalidate>

        <div id="two-factor-auth-section" style="display: none;">
          <p>Insira o código 2FA enviado para seu e-mail.</p>
          <div class="form-group">
            <input type="text" id="twoFactorCode" class="form-input" placeholder="Código 2FA" required>
            <label class="floating-label">Código 2FA <span class="required">*</span></label>
          </div>
          <button type="button" id="resendTwoFactorCode" class="link-button">Reenviar Código</button>
        </div>
        <h2 class="welcome-text">Iniciar sessão</h2>
        <p class="welcome-subtitle">Bem-vindo à Roxinho Shop! Por favor, insira seus dados</p>

        <!-- E-mail -->
        <div class="form-group">
          <input type="email" id="email" class="form-input" required>
          <label class="floating-label">E-mail <span class="required">*</span></label>
        </div>

        <!-- Senha -->
        <div class="form-group">
          <input type="password" id="senha" class="form-input" required>
          <label class="floating-label">Senha <span class="required">*</span></label>
          <span class="toggle-password" onclick="togglePasswordVisibility('senha')"><i class="fa fa-eye" aria-hidden="true"></i></span>
        </div>

        <div class="forgot-password">
          <a href="redefinir-senha.html">Esqueceu sua senha?</a>
        </div>

        <div class="beta-notice">
          <span>Você está acessando uma versão beta.</span>
        </div>

        <button type="submit" class="login-button" id="botaoLogin">
          <span>Entrar</span>
        </button>

        <!-- Login com Google -->
        <div id="googleBtn" class="google-btn"></div>
        <div class="g_id_signin"
             data-type="standard"
             data-shape="pill"
             data-theme="outline"
             data-text="sign_in_with"
             data-size="large">
        </div>

        <!-- Link para cadastro -->
        <p class="register-link">
          Não tem uma conta ainda? 
          <a href="./cadastro.html">Cadastre-se</a>
        </p>
      </form>
    </div>
  </main>

    <!-- Placeholder para Footer -->
  


  <!-- Scripts -->
  <script src="src/scripts/componentes/botao-carregamento.js"></script>
  <script src="src/scripts/servicos/banco-dados.js"></script>
  <script src="src/scripts/componentes/animacao-sucesso.js"></script>
  <script src="src/scripts/componentes/entrar.js"></script>
  <script src="https://accounts.google.com/gsi/client" async defer></script>
  
  
  
  








<div id="footer-placeholder"></div>
<script src="load-header-footer.js"></script>
</body>
</html>
