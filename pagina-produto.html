
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Roxinho Shop - Os melhores preços em eletrônicos!</title>

  <link rel="icon" type="image/png" href="src/recursos/imagens/favicon-rooxyce.png">

  <!-- CSS -->
  <link rel="stylesheet" href="src/estilos/layouts/cabecalho-rodape.css">
  <link rel="stylesheet" href="src/estilos/componentes/pagina-produto.css">
  <link rel="stylesheet" href="src/estilos/componentes/pagina-produto-melhorias.css">
  <link rel="stylesheet" href="src/estilos/componentes/cabecalho-autenticacao.css">
  <link rel="stylesheet" href="src/estilos/temas/design-fluent.css">
  <link rel="stylesheet" href="src/estilos/temas/modo-escuro.css">
  <link rel="stylesheet" href="src/estilos/temas/fluent-dark.css">
  <link rel="stylesheet" href="src/estilos/temas/correcao-espacos-brancos.css">
  <link rel="stylesheet" href="src/estilos/temas/botao-tema.css">
  <link rel="stylesheet" href="src/estilos/componentes/notificacoes-fluent.css">
  <link rel="stylesheet" href="src/estilos/componentes/busca-global.css">
  <link rel="stylesheet" href="src/estilos/temas/gradiente-hover-global.css">

  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" />
  
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Nunito+Sans:wght@200..1000&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>

<div id="header-placeholder"></div>

<nav class="breadcrumb-produto">
  <div class="breadcrumb-container-produto">
    <a href="index.html" class="breadcrumb-item"><i class="fas fa-home"></i> Início</a>
    <span class="breadcrumb-separator">></span>
    <a href="produtos.html" class="breadcrumb-item" id="breadcrumbCategoria">Produtos</a>
    <span class="breadcrumb-separator">></span>
    <span class="breadcrumb-item ativo" id="breadcrumbProduto">Produto</span>
  </div>
</nav>

<div class="pagina-produto">
  <div class="coluna-esquerda">
    <div class="imagem-principal" id="containerImagemPrincipal">
      <img id="imagemProduto" src="" alt="Imagem do produto">
      
      
    </div>
    <div class="miniaturas" id="miniaturas"></div>
  </div>

  <div class="coluna-direita">
    <div class="info-produto">
      <div class="marca">
        <span class="badge-marca" id="marcaProduto"></span>
      </div>
      <h1 id="nomeProduto"></h1>
      <div class="descricao-curta" id="descricaoProduto"></div>
      <div class="status-estoque">
        <span id="estoqueStatus"></span>
        <span class="sku" id="skuProduto"></span>
      </div>

      <div class="painel-compra">
        <div class="preco-container">
          <div class="preco-antigo-container">
            <div class="preco-original" id="precoOriginal"></div>
            <div class="desconto-badge" id="descontoProduto"></div>
          </div>
          <div class="preco-atual" id="precoProduto"></div>
          <div class="parcelamento" id="parcelamentoProduto"></div>
        </div>

        <div class="botoes-acao">
            <a href="#" id="btnMercadoLivre" class="btn-marketplace btn-ml" target="_blank" style="display: none;">
              <img src="/src/recursos/imagens/mercadolivre.png" alt="Mercado Livre" style="height: 24px; margin-right: 8px;">
              <span>Comprar no Mercado Livre</span>
              <i class="fas fa-external-link-alt"></i>
            </a>
            <a href="#" id="btnAmazon" class="btn-marketplace btn-amazon" target="_blank" style="display: none;">
              <img src="/src/recursos/imagens/amazon.png" alt="Amazon" style="height: 24px; margin-right: 8px;">
              <span>Comprar na Amazon</span>
              <i class="fas fa-external-link-alt"></i>
            </a>
        </div>
      </div>     

      <div class="descricao-completa">
        <h4><i class="fa-solid fa-file-alt"></i> Descrição do Produto</h4>
        <p id="descricaoProdutoCompleta"></p>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="src/scripts/servicos/banco-dados.js"></script>
<script src="src/scripts/componentes/pagina-produto.js"></script>
<script src="load-header-footer.js"></script>

</body>
</html>
