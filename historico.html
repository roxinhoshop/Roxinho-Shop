<!DOCTYPE html>

<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Histórico de Produtos Vistos | Roxinho Shop</title>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="src/recursos/imagens/favicon-roxinhoshop.png">

  <!-- CSS -->
  <link rel="stylesheet" href="src/estilos/layouts/cabecalho-rodape.css">

  <link rel="stylesheet" href="src/estilos/componentes/historico.css">
  
  <link rel="stylesheet" href="src/estilos/componentes/cabecalho-autenticacao.css">
  
  <link rel="stylesheet" href="src/estilos/temas/design-fluent.css">
  <link rel="stylesheet" href="src/estilos/temas/modo-escuro.css">
  <link rel="stylesheet" href="src/estilos/temas/fluent-dark.css">
  <link rel="stylesheet" href="src/estilos/temas/correcao-espacos-brancos.css">
  <link rel="stylesheet" href="src/estilos/temas/botao-tema.css">

  <!-- Font Awesome -->
  

  <!-- Google Fonts -->
  
  
  
</head>
<body>
<div id="header-placeholder"></div>



  

  <!-- Main Content -->
  <main class="conteudo-principal">
    <!-- Empty History State -->
    <div id="historico-vazio" class="estado-historico-vazio">
      <div class="conteudo-vazio">
        <div class="icone-historico-vazio">
          <i class="fas fa-eye"></i>
        </div>
        <h2 class="titulo-vazio">Você ainda não visualizou nenhum produto</h2>
        <p class="descricao-vazia">Comece a explorar nossos produtos e eles aparecerão aqui!</p>
        <button class="botao-explorar-produtos" onclick="window.location.href='produtos.html'">
          <i class="fas fa-arrow-left"></i>
          Explorar Produtos
        </button>
      </div>
    </div>

    <!-- History Content -->
    <div id="conteudo-historico" class="layout-historico">
      <div class="secao-produtos-vistos">
        <div class="cabecalho-secao">
          <h2>Produtos Vistos Recentemente</h2>
          <div class="acoes">
            <button id="btn-limpar-historico">
              <i class="fas fa-trash"></i>
              Limpar Histórico
            </button>
          </div>
        </div>
        <div id="lista-produtos-vistos" class="lista-produtos-vistos">
          <!-- Produtos vistos serão inseridos aqui dinamicamente -->
        </div>
      </div>
    </div>
  </main>

  <!-- Notificações (Toast) -->
  <div id="container-notificacoes" class="container-notificacoes"></div>

  

  <!-- JS -->
  <script src="src/scripts/servicos/banco-dados.js"></script>
  <script src="src/scripts/componentes/produtos.js"></script>
  <script src="src/scripts/componentes/historico.js"></script>
  
  
  
  






<div id="footer-placeholder"></div>
<script src="load-header-footer.js"></script>
</body>
</html>
